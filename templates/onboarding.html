<!DOCTYPE html>
<html>
<head>
    <title>CycleX AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0f1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #111827;
            border: 1px solid #2c3b5c;
            border-radius: 14px;
            padding: 30px;
            text-align: center;
            max-width: 720px;
            width: 100%;
        }

        .logo {
            max-width: 100%;
            height: auto;
            max-height: 140px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 34px;
        }

        p {
            color: #93c5fd;
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="{{ url_for('static', filename='cyclex-logo.jpg') }}" class="logo" alt="CycleX AI Logo">
        <h1>CycleX AI</h1>
        <p>AI Risk-Adaptive Market Intelligence</p>
    </div>
</body>
</html>
