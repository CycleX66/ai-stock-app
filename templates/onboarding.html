<!DOCTYPE html>
<html>
<head>
    <title>CycleX AI - Risk Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #0b0f1a;
            color: white;
            font-family: Arial, sans-serif;
        }
        body {
            padding: 40px 20px;
            text-align: center;
        }
        .card {
            background: #111827;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 32px;
            max-width: 780px;
            margin: auto;
            box-shadow: 0 8px 30px rgba(0,0,0,0.35);
        }
        .logo {
            width: 100%;
            max-width: 640px;
            height: auto;
            display: block;
            margin: 0 auto 24px auto;
            border-radius: 12px;
        }
        h1 {
            margin: 0 0 8px 0;
            font-size: 30px;
            background: linear-gradient(90deg, #60a5fa, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #cbd5e1;
            margin-bottom: 18px;
        }
        select, button {
            padding: 14px;
            font-size: 16px;
            margin-top: 14px;
            width: 100%;
            border-radius: 10px;
            border: none;
        }
        select {
            background: #0f172a;
            color: white;
            border: 1px solid #334155;
        }
        button {
            background: #2563eb;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="{{ url_for('static', filename='cyclex-logo.jpeg') }}" alt="CycleX AI Logo" class="logo">

        <h1>CycleX AI</h1>
        <p>AI Risk-Adaptive Market Intelligence Platform</p>

        <form action="/set-profile" method="post">
            <select name="risk">
                {% for item in risk_options %}
                    <option value="{{ item }}" {% if item == risk %}selected{% endif %}>{{ item }}</option>
                {% endfor %}
            </select>
            <button type="submit">Continue to CycleX</button>
        </form>
    </div>
</body>
</html>
