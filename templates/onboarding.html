<!DOCTYPE html>
<html>
<head>
    <title>Risk Profile</title>
</head>
<body style="background:#0b0f1a; color:white; font-family:Arial; text-align:center;">

<h1>📊 Investment Risk Profile</h1>

<p>Select your risk level:</p>

<form action="/" method="GET">

    <select name="risk" style="padding:10px; font-size:16px;">
        <option value="defensive">Defensive</option>
        <option value="cautious">Cautious</option>
        <option value="balanced">Balanced</option>
        <option value="growth">Growth</option>
        <option value="aggressive">Aggressive</option>
    </select>

    <br><br>

    <button type="submit" style="padding:10px 20px; font-size:16px;">
        Continue
    </button>

</form>

</body>
</html>
