<!DOCTYPE html>
<html>
<head>
    <title>CycleX AI</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b0f1a;
            color: white;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            border-bottom: 1px solid #1f2a44;
        }

        .logo {
            height: 60px;
        }

        .title {
            font-size: 26px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 14px;
            color: #7aa2ff;
        }

        .container {
            padding: 20px;
        }

        .filters {
            margin-bottom: 20px;
        }

        select {
            padding: 8px;
            margin-right: 10px;
            background: #111827;
            color: white;
            border: 1px solid #2c3b5c;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #1f2a44;
        }

        .buy { color: #00ff9c; }
        .sell { color: #ff4d4d; }
        .hold { color: #ffc107; }

        .portfolio {
            margin-top: 30px;
            padding: 20px;
            background: #111827;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- HEADER WITH LOGO -->
<div class="header">
    <img src="/static/cyclex-logo.jpg" class="logo">
    <div>
        <div class="title">CycleX AI</div>
        <div class="subtitle">AI Risk-Adaptive Market Intelligence</div>
    </div>
</div>

<div class="container">

    <!-- FILTERS -->
    <div class="filters">
        <select>
            <option>All Risk Levels</option>
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
        </select>

        <select>
            <option>All Markets</option>
            <option>US</option>
            <option>UK</option>
            <option>Europe</option>
            <option>Asia</option>
        </select>
    </div>

    <!-- SCANNER TABLE -->
    <table>
        <tr>
            <th>Company</th>
            <th>Signal</th>
            <th>Score</th>
            <th>Action</th>
        </tr>

        {% for stock in stocks %}
        <tr>
            <td>{{ stock.name }}</td>

            <td class="
                {% if stock.signal == 'BUY' %}buy
                {% elif stock.signal == 'SELL' %}sell
                {% else %}hold{% endif %}
            ">
                {{ stock.signal }}
            </td>

            <td>{{ stock.score }}</td>

            <td>
                <button>Add</button>
            </td>
        </tr>
        {% endfor %}
    </table>

    <!-- PORTFOLIO SECTION -->
    <div class="portfolio">
        <h2>Portfolio Overview</h2>
        <p>Total Value: £0</p>
        <p>Performance chart coming next step</p>
    </div>

</div>

</body>
</html>
