<!DOCTYPE html>
<html>
<head>
    <title>Investment Risk Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: #0b0f1a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
        }
        .card {
            background: #111827;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            margin: auto;
        }
        select, button {
            padding: 12px;
            font-size: 16px;
            margin-top: 15px;
            width: 100%;
            border-radius: 8px;
            border: none;
        }
        button {
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📊 Investment Risk Profile</h1>
        <p>Select your risk level:</p>

        <form action="/" method="GET">
            <select name="risk">
                <option value="defensive">Defensive</option>
                <option value="cautious">Cautious</option>
                <option value="balanced">Balanced</option>
                <option value="growth">Growth</option>
                <option value="aggressive">Aggressive</option>
            </select>

            <button type="submit">Continue</button>
        </form>
    </div>
</body>
</html>
